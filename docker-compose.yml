name: sentry-bundle

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentry-bundle-php
    working_dir: /app
    volumes:
      - .:/app
      - composer-cache:/root/.composer/cache
      - coverage-data:/app/coverage
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - XDEBUG_MODE=coverage
    command: ["tail", "-f", "/dev/null"]
    networks:
      - sentry-bundle-network

volumes:
  composer-cache:
    driver: local
  coverage-data:
    driver: local

networks:
  sentry-bundle-network:
    driver: bridge
