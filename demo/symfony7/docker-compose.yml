name: sentry-bundle-demo-symfony-7

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentry-demo-symfony7-php
    working_dir: /app
    ports:
      - "${PORT:-8001}:80"
    volumes:
      - .:/app
      - ../..:/var/sentry-bundle
      - ./docker/frankenphp/Caddyfile.dev:/etc/frankenphp/Caddyfile.dev
      - ./docker/php-dev.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
      - composer-cache:/root/.composer/cache
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - APP_ENV=dev
      - APP_DEBUG=1
      - APP_SECRET=${APP_SECRET:-demo-secret}
      - SENTRY_DSN=${SENTRY_DSN:-}
    networks:
      - sentry-demo-network

volumes:
  composer-cache:
    driver: local

networks:
  sentry-demo-network:
    driver: bridge
