name: sentry-bundle-demo-symfony-8-php85

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentry-demo-symfony8-php85-php
    working_dir: /app
    volumes:
      - .:/app
      # Mount bundle root so the path repo symlink works and template/code changes are visible
      - ../..:/var/sentry-bundle
      - composer-cache:/root/.composer/cache
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - APP_ENV=dev
      - APP_DEBUG=1
      - SENTRY_DSN=
    command: php-fpm
    networks:
      - sentry-demo-network

  nginx:
    image: nginx:alpine
    container_name: sentry-demo-symfony8-php85-nginx
    ports:
      - "${PORT:-8001}:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - sentry-demo-network

volumes:
  composer-cache:
    driver: local

networks:
  sentry-demo-network:
    driver: bridge

