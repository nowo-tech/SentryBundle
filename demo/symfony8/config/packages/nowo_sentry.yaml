# Default configuration for Sentry Bundle
# This bundle extends the official Sentry Symfony bundle with enhanced event listeners

nowo_sentry:
    request_listener:
        enabled: true
        set_domain_tag: true
        set_environment_tag: true
        set_user_info: true
        set_session_id: true
        priority: 0

    ignore_access_denied_listener:
        enabled: true

    before_send_handler:
        enabled: true
        ignore_pure_access_denied: true
        register_automatically: true

    sub_request_access_denied_listener:
        enabled: true
        priority: 256

    uptime_bot_listener:
        enabled: true
        user_agents:
            - 'SentryUptimeBot/1.0'
        paths:
            - '/'
            - '/login'
        priority: 255

    error_reporter:
        enabled: true

    dbal_exception_reporter:
        enabled: true
        connections: []
        sql_states: []
        priority: 20
        deduplicate: true
