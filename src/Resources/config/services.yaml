---
services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Nowo\SentryBundle\EventListener\SentryRequestListener:
    class: Nowo\SentryBundle\EventListener\SentryRequestListener
    arguments:
      $sentryHub: '@?Sentry\State\HubInterface'
      $config: '%nowo_sentry.request_listener%'
      $environment: '%kernel.environment%'
    # Tags are added conditionally in NowoSentryExtension based on configuration

  Nowo\SentryBundle\EventListener\SubRequestAccessDeniedContextListener:
    class: Nowo\SentryBundle\EventListener\SubRequestAccessDeniedContextListener
    arguments:
      $sentryHub: '@?Sentry\State\HubInterface'
      $config: '%nowo_sentry.sub_request_access_denied_listener%'
    # Tags are added conditionally in NowoSentryExtension based on configuration

  nowo_sentry.before_send_handler:
    class: Nowo\SentryBundle\Sentry\BeforeSendHandler
    arguments:
      $config: '%nowo_sentry.before_send_handler%'
      $reportedSqlExceptionRegistry: '@?Nowo\SentryBundle\Doctrine\DBAL\ReportedSqlExceptionRegistry'

  Nowo\SentryBundle\Service\SentryErrorReporter:
    class: Nowo\SentryBundle\Service\SentryErrorReporter
    arguments:
      $sentryHub: '@?Sentry\State\HubInterface'
      $logger: '@?logger'
    public: true

  Nowo\SentryBundle\EventListener\SentryUptimeBotListener:
    class: Nowo\SentryBundle\EventListener\SentryUptimeBotListener
    arguments:
      $config: '%nowo_sentry.uptime_bot_listener%'
    # Tags are added conditionally in NowoSentryExtension based on configuration
