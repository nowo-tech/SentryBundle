# Default configuration for Sentry Bundle
# This bundle extends the official Sentry Symfony bundle with enhanced event listeners

nowo_sentry:
    # Request Listener Configuration
    request_listener:
        enabled: true
        set_domain_tag: true
        set_environment_tag: true
        set_user_info: true
        set_session_id: false
        priority: 0

    # Pure 403 responses are dropped; parent-page failures caused by a sub-request 403 are kept
    ignore_access_denied_listener:
        enabled: true                    # BC toggle; maps to before_send_handler.ignore_pure_access_denied

    before_send_handler:
        enabled: true
        ignore_pure_access_denied: true
        register_automatically: true

    # Adds Sentry tags when a sub-request 403 breaks the parent page
    sub_request_access_denied_listener:
        enabled: true
        priority: 256

    uptime_bot_listener:
        enabled: true
        user_agents:
            - 'SentryUptimeBot/1.0'
        paths:
            - '/health'
        priority: 255

    error_reporter:
        enabled: true

    dbal_exception_reporter:
        enabled: true
        connections: []
        sql_states: []
        priority: 20
        deduplicate: true
