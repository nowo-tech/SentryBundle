name: Sync Releases

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write

jobs:
  sync-releases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync missing releases for v* tags
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const tags = await github.paginate(github.rest.repos.listTags, {
              owner,
              repo,
              per_page: 100,
            });

            const versionTags = tags.map(t => t.name).filter(name => /^v\d+\.\d+\.\d+$/.test(name));
            core.info(`Found ${versionTags.length} semver tags`);

            for (const tag of versionTags) {
              let releaseExists = true;

              try {
                await github.rest.repos.getReleaseByTag({
                  owner,
                  repo,
                  tag,
                });
              } catch (error) {
                if (error.status === 404) {
                  releaseExists = false;
                } else {
                  throw error;
                }
              }

              if (releaseExists) {
                core.info(`Release already exists for ${tag}`);
                continue;
              }

              core.info(`Creating missing release for ${tag}`);
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: `Release ${tag}`,
                body: `Auto-created release for ${tag}.`,
                draft: false,
                prerelease: false,
                generate_release_notes: true,
              });
            }
